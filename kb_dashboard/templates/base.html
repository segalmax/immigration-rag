<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}USCIS KB Dashboard{% endblock %}</title>

  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tabulator (sortable + groupBy pivot table) -->
  <link href="https://unpkg.com/tabulator-tables@6.2.1/dist/css/tabulator_bootstrap5.min.css" rel="stylesheet">
  <script src="https://unpkg.com/tabulator-tables@6.2.1/dist/js/tabulator.min.js"></script>

  <!-- Tippy.js (hover tooltips) -->
  <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/dist/tippy.css">
  <script src="https://unpkg.com/@popperjs/core@2/dist/umd/popper.min.js"></script>
  <script src="https://unpkg.com/tippy.js@6/dist/tippy-bundle.umd.min.js"></script>

  <style>
    /* subtle scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }

    /* markdown content area */
    .prose h1 { font-size:1.5rem; font-weight:700; margin:1rem 0 .5rem; }
    .prose h2 { font-size:1.2rem; font-weight:600; margin:.9rem 0 .4rem; border-bottom:1px solid #e2e8f0; padding-bottom:.25rem; }
    .prose h3 { font-size:1rem; font-weight:600; margin:.75rem 0 .3rem; }
    .prose p  { margin:.5rem 0; line-height:1.7; }
    .prose ul { list-style:disc; margin:.5rem 0 .5rem 1.5rem; }
    .prose ol { list-style:decimal; margin:.5rem 0 .5rem 1.5rem; }
    .prose table { border-collapse:collapse; width:100%; margin:.75rem 0; font-size:.85rem; }
    .prose th { background:#f1f5f9; padding:.4rem .6rem; border:1px solid #cbd5e1; text-align:left; }
    .prose td { padding:.4rem .6rem; border:1px solid #e2e8f0; vertical-align:top; }
    .prose tr:nth-child(even) td { background:#f8fafc; }
    .prose code { background:#f1f5f9; padding:.1rem .3rem; border-radius:3px; font-size:.85em; }
    .prose pre  { background:#1e293b; color:#e2e8f0; padding:1rem; border-radius:6px; overflow-x:auto; margin:.75rem 0; }
    .prose pre code { background:none; color:inherit; }
    .prose strong { font-weight:600; }
    .prose em { font-style:italic; }
  </style>
</head>
<body class="h-full flex flex-col font-sans text-gray-800">

  <!-- Nav -->
  <nav class="bg-indigo-700 text-white shadow-md sticky top-0 z-50">
    <div class="max-w-screen-xl mx-auto px-6 flex items-center gap-8 h-14">
      <span class="font-bold text-lg tracking-tight">USCIS Policy KB</span>
      <a href="/" class="text-indigo-200 hover:text-white text-sm font-medium transition
                         {% if request.path == '/' %}!text-white underline underline-offset-4{% endif %}">
        Dashboard
      </a>
      <a href="/browse" class="text-indigo-200 hover:text-white text-sm font-medium transition
                               {% if request.path.startswith('/browse') and not request.path.startswith('/s3') %}!text-white underline underline-offset-4{% endif %}">
        Browse
      </a>
      <a href="/ask" class="text-indigo-200 hover:text-white text-sm font-medium transition
                            {% if request.path == '/ask' %}!text-white underline underline-offset-4{% endif %}">
        Ask
      </a>

      <span class="text-indigo-500 opacity-40 select-none">|</span>

      <a href="/upload" class="text-indigo-200 hover:text-white text-sm font-medium transition
                               {% if request.path == '/upload' %}!text-white underline underline-offset-4{% endif %}">
        ☁️ Upload
      </a>
      <a href="/s3/" class="text-indigo-200 hover:text-white text-sm font-medium transition
                            {% if request.path == '/s3/' %}!text-white underline underline-offset-4{% endif %}">
        S3 Dashboard
      </a>
      <a href="/s3/browse" class="text-indigo-200 hover:text-white text-sm font-medium transition
                                  {% if request.path.startswith('/s3/browse') %}!text-white underline underline-offset-4{% endif %}">
        S3 Browse
      </a>
    </div>
  </nav>

  <!-- Page content -->
  <main class="flex-1 overflow-auto">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
